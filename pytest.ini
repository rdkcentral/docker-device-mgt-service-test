[pytest]
# Pytest configuration for xPKI PKCS#11 Integration Tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = 
    -v
    -s
    --tb=short
    --color=yes

# Test markers
markers =
    docker: tests that require Docker containers
    xpki: tests that require xPKI server (mockxconf)
    pkcs11: tests that require PKCS#11 infrastructure
    integration: integration tests (may be slow)

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)s: %(message)s

# Test directory
testpaths = test

# Coverage (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=. --cov-report=html --cov-report=term
